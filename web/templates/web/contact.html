{% extends 'web/base.html' %}

{% block content %}
<main class="pt-32 pb-24">
    <div class="max-w-3xl mx-auto px-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 md:p-12">
            <div class="text-center mb-12">
                <h1 class="text-3xl font-bold text-slate-900 mb-4">Contact Us</h1>
                <p class="text-slate-600">Have questions? We'd love to hear from you.</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div
                class="mb-8 p-4 rounded-lg {% if message.tags == 'success' %}bg-green-50 text-green-700{% else %}bg-red-50 text-red-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'contact' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                    <input type="text" id="name" name="name" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-600/20 focus:border-red-600 transition-all">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-600/20 focus:border-red-600 transition-all">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-slate-700 mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-600/20 focus:border-red-600 transition-all"></textarea>
                </div>

                <button type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-4 rounded-xl transition-all shadow-lg shadow-red-600/20">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
